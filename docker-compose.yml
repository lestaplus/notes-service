version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: notes_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - notes-network
    restart: always

  web:
    build: .
    depends_on:
      - db
    networks:
      - notes-network
    restart: always

  nginx:
    image: nginx:alpine
    ports:
    - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - notes-network
    restart: always

networks:
  notes-network:
    driver: bridge
  
volumes:
  pgdata: